<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Questionz Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .container {
            margin-top: 12%;
        }

        img {
            width: 260px; /* adjust if needed */
            margin-bottom: 40px;
        }

        .search-box {
            width: 40%;
            min-width: 300px;
            height: 45px;
            border: 1px solid #dcdcdc;
            border-radius: 24px;
            padding: 0 20px;
            font-size: 18px;
            outline: none;
        }

        .search-wrapper {
            position: relative;
            display: inline-block;
        }

        .search-button {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
        }

        .search-button img {
            width: 22px;
            opacity: 0.6;
        }

        .search-button img:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Your logo -->
        <img src="questionz.png" alt="Questionz Logo">

        <div class="search-wrapper">
            <input class="search-box" type="text" placeholder="Search Questionz...">
            <!-- Clicking this goes to the error page -->
            <button class="search-button" onclick="window.location.href='no-internet.html'">
                <img src="search-icon.png" alt="Search">
            </button>
        </div>
    </div>

</body>
</html>
